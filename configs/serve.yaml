# RAG-ASR service configuration.
#
# This is the single service configuration entry. Edit this file for the
# current deployment, or set RAG_ASR_CONFIG to another YAML file with the same
# schema.

model:
  base_model_path: checkpoints/base/amphion_1.7b_merged
  adapter_subdir: hotword_adapter
  adapter_filename: best_adapter.pt
  # Optional legacy override. Prefer base_model_path/hotword_adapter/best_adapter.pt.
  # adapter_ckpt: checkpoints/adapters/amphion-1.7b_retrieval_v1.2/best_adapter.pt
  embed_dim: 512
  adapter_hidden_dim: 512

retrieval:
  hotword_pool_file: examples/hotword_pool.txt
  default_top_k: 50
  cache_dir: var/retrieve_cache
  batch_text: 512

runtime:
  device: cuda
  cuda_visible_devices: "0"
  num_mel_bins: 128

triton:
  model_repo: triton
  rendered_model_repo: var/triton_repo
  # Build this conda-pack archive with scripts/build_triton_exec_env.sh.
  exec_env: var/triton-exec-env.tar.gz
  # backend_dir is auto-derived from tritonserver; set explicitly if needed.
  # backend_dir: /path/to/tritonserver/backends
  # Keep off for the default Triton 24.10 Python 3.10 backend stub. Set this
  # only when using a custom stub that expects a deployment-managed symlink.
  python_stub_link: off
  http_port: 10001
  grpc_port: 10002
  metrics_port: 10003
