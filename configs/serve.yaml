# RAG-ASR service configuration.
#
# Edit this file for the current deployment. Machine-specific values can also
# be provided through environment variables referenced as ${VAR_NAME}.

model:
  base_model_path: checkpoints/base/amphion_1.7b_merged
  adapter_subdir: hotword_adapter
  adapter_filename: best_adapter.pt
  # Optional legacy override. Prefer base_model_path/hotword_adapter/best_adapter.pt.
  # adapter_ckpt: checkpoints/adapters/amphion-1.7b_retrieval_v1.2/best_adapter.pt
  embed_dim: 512
  adapter_hidden_dim: 512

retrieval:
  hotword_pool_file: examples/hotword_pool.txt
  default_top_k: 50
  cache_dir: var/retrieve_cache
  batch_text: 512

runtime:
  device: cuda
  cuda_visible_devices: "1"
  num_mel_bins: 128

triton:
  model_repo: triton
  rendered_model_repo: var/triton_repo
  # start_triton.sh activates the "triton" conda env before reading this file.
  # The Python backend execution env is expected to live next to it by default.
  exec_env: ${CONDA_PREFIX}/../triton-exec
  # backend_dir defaults to ${TRITONSERVER_ROOT}/backends in start_triton.sh.
  # backend_dir: /path/to/tritonserver/backends
  python_stub_link: /opt/pyenv_build/versions/3.12.3
  http_port: 8000
  grpc_port: 8001
